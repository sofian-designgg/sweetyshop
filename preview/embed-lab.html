<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SweetyShop — Prévisualisation embed (JSON)</title>
  <style>
    :root {
      --bg: #313338;
      --side: #2b2d31;
      --embed: #2f3136;
      --text: #dbdee1;
      --muted: #949ba4;
      --accent: #5865f2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "gg sans", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 380px;
    }
    @media (max-width: 900px) {
      body { grid-template-columns: 1fr; }
    }
    .editor {
      padding: 1.25rem;
      background: var(--side);
      border-right: 1px solid #1e1f22;
    }
    h1 { font-size: 1.1rem; margin: 0 0 0.5rem; }
    p.hint { color: var(--muted); font-size: 0.85rem; margin: 0 0 1rem; }
    textarea {
      width: 100%;
      min-height: 320px;
      background: #1e1f22;
      color: #b5bac1;
      border: 1px solid #3f4147;
      border-radius: 8px;
      padding: 0.75rem;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      resize: vertical;
    }
    button {
      margin-top: 0.75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.08); }
    .err { color: #f23f42; font-size: 0.85rem; margin-top: 0.5rem; }
    .stage {
      padding: 1.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .discord-msg {
      max-width: 520px;
      width: 100%;
      display: flex;
      gap: 1rem;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5865f2, #eb459e);
      flex-shrink: 0;
    }
    .bubble { flex: 1; min-width: 0; }
    .author {
      font-size: 0.95rem;
      margin-bottom: 0.35rem;
    }
    .author strong { color: #fff; }
    .bot-tag {
      background: #5865f2;
      color: #fff;
      font-size: 0.65rem;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      margin-left: 0.35rem;
      vertical-align: middle;
    }
    .embed {
      background: var(--embed);
      border-left: 4px solid var(--accent);
      border-radius: 4px 8px 8px 4px;
      padding: 0.75rem 1rem 0.75rem 0.75rem;
      max-width: 100%;
    }
    .embed .title { color: #fff; font-weight: 600; margin-bottom: 0.5rem; }
    .embed .desc { color: var(--text); font-size: 0.9rem; white-space: pre-wrap; line-height: 1.45; }
    .embed img.banner { width: 100%; border-radius: 8px; margin-top: 0.5rem; display: block; }
    .embed .fields { margin-top: 0.5rem; display: grid; gap: 0.35rem; }
    .embed .field-name { color: #fff; font-size: 0.8rem; font-weight: 600; }
    .embed .field-val { color: var(--muted); font-size: 0.85rem; white-space: pre-wrap; }
    .embed .footer { margin-top: 0.5rem; color: var(--muted); font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="editor">
    <h1>Labo embed Discord</h1>
    <p class="hint">
      Colle un JSON compatible bot (champs : <code>title</code>, <code>description</code>,
      <code>color</code> nombre ou <code>"#5865F2"</code>, <code>image</code>, <code>footer</code>,
      <code>fields</code>).
    </p>
    <textarea id="json" spellcheck="false"></textarea>
    <button type="button" id="render">Rafraîchir la prévisualisation</button>
    <div class="err" id="err"></div>
  </div>
  <div class="stage">
    <div class="discord-msg">
      <div class="avatar" aria-hidden="true"></div>
      <div class="bubble">
        <div class="author">
          <strong>SweetyShop</strong><span class="bot-tag">BOT</span>
          <span style="color:var(--muted);font-size:0.8rem;margin-left:0.35rem">Aujourd’hui à 15:42</span>
        </div>
        <div id="embed-host"></div>
      </div>
    </div>
  </div>
  <script>
    const sample = {
      title: "🌊 Centre support",
      description: "Bienvenue sur **SweetyShop**.\n\n**Une question sur le Nitro ?**\n*Appuie sur le bouton correspondant.*",
      color: 5793266,
      image: "https://cdn.discordapp.com/attachments/placeholder/banner.png",
      footer: "Paiement sécurisé · Réponse rapide",
      fields: [
        { name: "PayPal", value: "`À configurer`", inline: true },
        { name: "Crypto", value: "LTC · ETH · SOL", inline: true }
      ]
    };
    const ta = document.getElementById("json");
    const host = document.getElementById("embed-host");
    const err = document.getElementById("err");
    ta.value = JSON.stringify(sample, null, 2);

    function parseColor(c) {
      if (typeof c === "number") return c;
      if (typeof c === "string" && c.startsWith("#")) return parseInt(c.slice(1), 16);
      return 0x5865f2;
    }

    function render() {
      err.textContent = "";
      let data;
      try {
        data = JSON.parse(ta.value);
      } catch (e) {
        err.textContent = "JSON invalide : " + e.message;
        return;
      }
      const color = parseColor(data.color);
      const hex = "#" + color.toString(16).padStart(6, "0");
      const embed = document.createElement("div");
      embed.className = "embed";
      embed.style.borderLeftColor = hex;
      if (data.title) {
        const t = document.createElement("div");
        t.className = "title";
        t.textContent = data.title;
        embed.appendChild(t);
      }
      if (data.description) {
        const d = document.createElement("div");
        d.className = "desc";
        d.innerHTML = data.description
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.+?)\*/g, "<em>$1</em>")
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\n/g, "<br/>");
        embed.appendChild(d);
      }
      if (data.fields && data.fields.length) {
        const grid = document.createElement("div");
        grid.className = "fields";
        data.fields.forEach((f) => {
          const fn = document.createElement("div");
          fn.className = "field-name";
          fn.textContent = f.name || "\u200b";
          const fv = document.createElement("div");
          fv.className = "field-val";
          fv.innerHTML = (f.value || "").replace(/\n/g, "<br/>");
          grid.appendChild(fn);
          grid.appendChild(fv);
        });
        embed.appendChild(grid);
      }
      if (data.image) {
        const img = document.createElement("img");
        img.className = "banner";
        img.src = data.image;
        img.alt = "";
        img.referrerPolicy = "no-referrer";
        img.onerror = () => { img.style.display = "none"; };
        embed.appendChild(img);
      }
      if (data.footer) {
        const ft = document.createElement("div");
        ft.className = "footer";
        ft.textContent = data.footer;
        embed.appendChild(ft);
      }
      host.innerHTML = "";
      host.appendChild(embed);
    }

    document.getElementById("render").addEventListener("click", render);
    render();
  </script>
</body>
</html>
